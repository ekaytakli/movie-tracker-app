<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Tracker App</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
  />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-11 col-lg-10">

        <div class="card mb-4">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
              <h1 class="h3 mb-2 mb-md-0">🎬 Movie Tracker App</h1>
              <button id="toggle-dark" class="btn btn-dark">Dark Mode</button>
            </div>

            <p class="text-muted">
              Filmlerini ekle, favorilere al ve izleme durumunu takip et.
            </p>

            <form id="film-form">
              <div class="form-group">
                <label for="movie-search">Film Ara</label>
                <div class="d-flex">
                  <input
                    type="text"
                    id="movie-search"
                    class="form-control mr-2"
                    placeholder="Örn: Interstellar"
                  />
                  <button type="button" id="search-movie-btn" class="btn btn-info">
                    Film Ara
                  </button>
                </div>
                <div id="search-results" class="list-group mt-2"></div>
              </div>

              <div class="form-group">
                <label for="title">Film Adı</label>
                <input
                  type="text"
                  id="title"
                  class="form-control"
                  placeholder="Örn: Inception"
                />
              </div>

              <div class="form-group">
                <label for="director">Yönetmen</label>
                <input
                  type="text"
                  id="director"
                  class="form-control"
                  placeholder="Örn: Christopher Nolan"
                />
              </div>

              <div class="form-group">
                <label for="url">Poster URL</label>
                <input
                  type="text"
                  id="url"
                  class="form-control"
                  placeholder="https://..."
                />
              </div>

              <button type="submit" class="btn btn-primary">Film Ekle</button>
            </form>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
              <h2 class="h5 mb-2 mb-md-0">
                Toplam Film: <span id="film-count">0</span>
              </h2>

              <button id="clear-films" class="btn btn-danger">
                Tüm Filmleri Temizle
              </button>
            </div>

            <input
              type="text"
              id="search"
              class="form-control mb-3"
              placeholder="Film ara..."
            />

            <div class="filter-buttons mb-3">
              <button class="btn btn-outline-primary btn-sm filter-btn active" data-filter="all">
                Tümü
              </button>
              <button class="btn btn-outline-warning btn-sm filter-btn" data-filter="watchlist">
                Watchlist
              </button>
              <button class="btn btn-outline-success btn-sm filter-btn" data-filter="watched">
                Watched
              </button>
              <button class="btn btn-outline-danger btn-sm filter-btn" data-filter="favorites">
                Favoriler
              </button>
            </div>

            <div id="films" class="movie-grid"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../js/film.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
