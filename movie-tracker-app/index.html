<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Tracker App</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-11 col-lg-10">

        <!-- HEADER -->
        <div class="card mb-4">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
              <h1 class="h3 mb-2 mb-md-0">🎬 Movie Tracker App</h1>
              <button id="toggle-dark" class="btn btn-dark">Dark Mode</button>
            </div>

            <p class="text-muted">
              Add movies, mark favorites, and track your watch status.
            </p>

            <!-- FORM -->
            <form id="film-form">

              <!-- SEARCH -->
              <div class="form-group">
                <label for="movie-search">Search Movie</label>
                <div class="d-flex">
                  <input
                    type="text"
                    id="movie-search"
                    class="form-control mr-2"
                    placeholder="Example: Interstellar"
                  />
                  <button type="button" id="search-movie-btn" class="btn btn-info">
                    Search Movie
                  </button>
                </div>

                <!-- SEARCH RESULTS -->
                <div id="search-results" class="list-group mt-2"></div>
              </div>

              <!-- TITLE -->
              <div class="form-group">
                <label for="title">Movie Title</label>
                <input
                  type="text"
                  id="title"
                  class="form-control"
                  placeholder="Example: Inception"
                />
              </div>

              <!-- DIRECTOR -->
              <div class="form-group">
                <label for="director">Director</label>
                <input
                  type="text"
                  id="director"
                  class="form-control"
                  placeholder="Example: Christopher Nolan"
                />
              </div>

              <!-- POSTER -->
              <div class="form-group">
                <label for="url">Poster URL</label>
                <input
                  type="text"
                  id="url"
                  class="form-control"
                  placeholder="https://..."
                />
              </div>

              <button type="submit" class="btn btn-primary">Add Movie</button>
            </form>
          </div>
        </div>

        <!-- LIST -->
        <div class="card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
              <h2 class="h5 mb-2 mb-md-0">
                Total Movies: <span id="film-count">0</span>
              </h2>

              <button id="clear-films" class="btn btn-danger">
                Clear All Movies
              </button>
            </div>

            <input
              type="text"
              id="search"
              class="form-control mb-3"
              placeholder="Search movies..."
            />

            <div class="filter-buttons mb-3">
              <button class="btn btn-outline-primary btn-sm filter-btn active" data-filter="all">
                All
              </button>
              <button class="btn btn-outline-warning btn-sm filter-btn" data-filter="watchlist">
                Watchlist
              </button>
              <button class="btn btn-outline-success btn-sm filter-btn" data-filter="watched">
                Watched
              </button>
              <button class="btn btn-outline-danger btn-sm filter-btn" data-filter="favorites">
                Favorites
              </button>
            </div>

            <!-- FILM CARDS -->
            <div id="films" class="movie-grid"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="js/film.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
